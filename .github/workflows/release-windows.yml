name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  release:
    needs: quality
    runs-on: windows-latest
    environment: MEGURI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: |
            go.work.sum
            front/go.sum
            backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front/frontend/package-lock.json

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Resolve Go bin directory
        id: go-env
        shell: bash
        run: |
          echo "gobin=$(go env GOPATH | tr '\\' '/')/bin" >> "$GITHUB_OUTPUT"
          echo "$(go env GOPATH | tr '\\' '/')/bin" >> "$GITHUB_PATH"

      - name: Cache Wails CLI
        uses: actions/cache@v4
        id: wails3-cache
        with:
          path: ${{ steps.go-env.outputs.gobin }}/wails3.exe
          key: ${{ runner.os }}-wails3-v3.0.0-alpha2.109

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync app version files
        run: go run ./tools/version-mng "${{ steps.version.outputs.value }}"

      - name: Install Wails CLI
        if: steps.wails3-cache.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.109
        working-directory: front

      - name: Configure frontend environment
        shell: bash
        working-directory: front/frontend
        env:
          VITE_FEEDBACK_URL: ${{ secrets.VITE_FEEDBACK_URL }}
        run: |
          {
            echo '# フィードバック送信先 URL（未設定時は MenuBar のボタンを非表示）'
            printf 'VITE_FEEDBACK_URL=%s\n' "${VITE_FEEDBACK_URL}"
          } > .env

      - name: Build and package
        run: wails3 task windows:package-universal INSTALL_SCOPE=user APP_VERSION=${{ steps.version.outputs.value }}
        working-directory: front

      - name: Create updater zips
        shell: pwsh
        run: |
          Compress-Archive -Path "front/bin/meguri-amd64.exe" -DestinationPath "front/bin/meguri-windows-amd64.zip" -Force
          Compress-Archive -Path "front/bin/meguri-arm64.exe" -DestinationPath "front/bin/meguri-windows-arm64.zip" -Force

      - name: Generate SHA256SUMS and signature
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
        run: go run ./tools/sign-release ./front/bin

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          if go run ./tools/changelog-extract "${{ steps.version.outputs.value }}" > release-notes.md; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            front/bin/meguri-amd64_arm64-installer.exe
            front/bin/meguri-windows-amd64.zip
            front/bin/meguri-windows-arm64.zip
            front/bin/SHA256SUMS
          body_path: release-notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        if: steps.changelog.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            front/bin/meguri-amd64_arm64-installer.exe
            front/bin/meguri-windows-amd64.zip
            front/bin/meguri-windows-arm64.zip
            front/bin/SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SHA256SUMS signature
        if: hashFiles('front/bin/SHA256SUMS.sig') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: front/bin/SHA256SUMS.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
