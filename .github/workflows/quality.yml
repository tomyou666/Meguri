name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-and-vuln:
    name: Test and vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: |
            go.work.sum
            front/go.sum
            backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front/frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            chromium
          if command -v chromium >/dev/null; then
            echo "MEGURI_CHROMIUM_PATH=$(command -v chromium)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null; then
            echo "MEGURI_CHROMIUM_PATH=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          fi

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: front/frontend

      - name: Run vulnerability checks
        run: make vuln

      - name: Run tests
        run: make test
