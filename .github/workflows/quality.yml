name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-and-vuln:
    name: Test and vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: |
            go.work.sum
            front/go.sum
            backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front/frontend/package-lock.json

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: front/frontend

      - name: Run vulnerability checks
        run: make vuln

      - name: Run tests
        run: make test
