version: "2"
linters:
  default: standard
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - '\.gen\.go$'
      - wire_gen\.go$
      - _with_debug_log\.go$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - '\.gen\.go$'
      - wire_gen\.go$
      - _with_debug_log\.go$
